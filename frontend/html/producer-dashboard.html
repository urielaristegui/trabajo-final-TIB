<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SampleVault - Mis Sonidos</title>
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
</head>
<body>

<div class="w3-bar w3-black w3-border-bottom w3-border-dark-grey">
    <span class="w3-bar-item w3-text-yellow"><b>SAMPLEVAULT</b></span>
    <button class="w3-bar-item w3-button w3-right btn-logout">Salir</button>
</div>

<div class="w3-container w3-padding-32">
    <div class="w3-row-padding">
        
        <div class="w3-col l4 m5 s12">
            <div class="w3-card-4 vault-card w3-padding w3-round">
                <h3 class="w3-text-yellow">Subir Nuevo Sample</h3>
                <form id="uploadForm">
                    <label>Nombre del Sonido</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="text" id="display_name" required>
                    
                    <label class="w3-margin-top w3-show">Categoría</label>
                    <select class="w3-select w3-border w3-round w3-black w3-text-white" id="category">
                        <option value="Kick">Kick (Bombo)</option>
                        <option value="Snare">Snare (Redoblante)</option>
                        <option value="Hi-Hat">Hi-Hat</option>
                        <option value="Loop">Melody Loop</option>
                        <option value="FX">Efectos (FX)</option>
                    </select>

                    <label class="w3-margin-top w3-show">BPM (Opcional)</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="number" id="bpm" value="120">

                    <label class="w3-margin-top w3-show">Archivo de Audio (WAV/MP3)</label>
                    <input class="w3-input w3-border w3-round" type="file" id="audioFile" accept="audio/*" required>

                    <button type="submit" class="w3-button w3-yellow w3-block w3-round-large w3-margin-top">
                        <b>CARGAR A LA BIBLIOTECA</b>
                    </button>
                </form>
            </div>
        </div>

        <div class="w3-col l8 m7 s12">
            <h3 class="w3-text-white">Mi Biblioteca Privada</h3>
            <div class="w3-responsive">
                <table class="w3-table w3-striped w3-bordered vault-card">
                    <thead>
                        <tr class="w3-yellow">
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>BPM</th>
                            <th>Escuchar</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="samplesTableBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="../js/services/apiService.js"></script>
<script src="../js/components/uiHandlers.js"></script>
<script src="../js/utils/authHelper.js"></script>
<script src="../js/frontControllers/samplesFrontController.js"></script>
</body>
</html>
